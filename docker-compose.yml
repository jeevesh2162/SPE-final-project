version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  auth-service:
    build: ./auth-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/scholar-study
      - JWT_SECRET=${JWT_SECRET:-scholar_secret_123}
    depends_on:
      - mongodb

  interview-service:
    build: ./interview-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGODB_URI=mongodb://mongodb:27017/scholar-study
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama3-70b-8192
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost/api
    depends_on:
      - nginx-gateway

  nginx-gateway:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - interview-service
      - frontend

volumes:
  mongodb_data:
