services:
  mongodb:
    image: mongo:4.4
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-nw
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth-service:
    image: ${DOCKER_HUB_USER}/auth-service:${IMAGE_TAG}
    environment:
      - MONGO_URI=mongodb://mongodb:27017/auth_db
      - JWT_SECRET=${JWT_SECRET:-default_scholar_secret_123}
      - PORT=5001
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend-nw
    restart: on-failure
    deploy:
      replicas: 2

  interview-service:
    image: ${DOCKER_HUB_USER}/interview-service:${IMAGE_TAG}
    environment:
      - MONGO_URI=mongodb://mongodb:27017/interview_db
      - JWT_SECRET=${JWT_SECRET:-default_scholar_secret_123}
      - GROQ_API_KEY=${GROQ_API_KEY:-no_key_provided}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - GROQ_TIMEOUT_MS=${GROQ_TIMEOUT_MS:-30000}
      - PORT=5002
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend-nw
    restart: on-failure
    deploy:
      replicas: 2

  frontend-service:
    image: ${DOCKER_HUB_USER}/frontend-service:${IMAGE_TAG}
    depends_on:
      - auth-service
      - interview-service
    networks:
      - frontend-nw
    restart: on-failure
    deploy:
      replicas: 2

  gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-service
      - auth-service
      - interview-service
    networks:
      - frontend-nw
      - backend-nw

networks:
  frontend-nw:
  backend-nw:

volumes:
  mongo-data:
