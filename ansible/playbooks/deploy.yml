---
- name: Deploy Microservices to Minikube
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../group_vars/all/vault.yml

  vars:
    docker_hub_user: "jeevesh2802"

  tasks:

    # ==============================
    # 1. CREATE KUBERNETES SECRET
    # ==============================
    - name: Apply Application Secrets from Vault
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: app-secrets
          type: Opaque
          stringData:
            JWT_SECRET: "{{ jwt_secret }}"
            GROQ_API_KEY: "{{ groq_api_key }}"
            MONGODB_URI: "{{ mongodb_uri }}"

    # ==============================
    # 2. APPLY DATABASE
    # ==============================
    - name: Apply MongoDB Manifest
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('file', '../../k8s/base/mongodb.yaml') | from_yaml }}"

    # ==============================
    # 3. APPLY SERVICES
    # ==============================
    - name: Apply Auth Service Manifest
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', '../../k8s/base/auth-deployment.yaml.j2') }}"

    - name: Apply Interview Service Manifest
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', '../../k8s/base/interview-deployment.yaml.j2') }}"

    - name: Apply Frontend Service Manifest
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', '../../k8s/base/frontend-deployment.yaml.j2') }}"

    # ==============================
    # 4. APPLY INGRESS
    # ==============================
    - name: Apply Ingress Manifest
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('file', '../../k8s/base/ingress.yaml') | from_yaml }}"

    # ==============================
    # 5. WAIT FOR ROLLOUTS
    # ==============================
    - name: Wait for MongoDB rollout
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: mongodb
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 180

    - name: Wait for Auth Service rollout
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: auth-service
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 180

    - name: Wait for Interview Service rollout
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: interview-service
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 180

    - name: Wait for Frontend Service rollout
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: frontend-service
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 180